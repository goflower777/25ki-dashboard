<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제25기 핵심인재과정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#1f2937;--bd:#30363d;--a1:#3b82f6;--a2:#10b981;--a3:#f59e0b;--a4:#ef4444;--t1:#e6edf3;--t2:#8b949e;--t3:#58a6ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:80px;}

/* HEADER */
header{background:linear-gradient(135deg,#1e3a5f 0%,#0d1117 60%);border-bottom:1px solid var(--bd);padding:16px 20px 14px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--a1);line-height:1;}
.logo span{color:var(--t2);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:300;letter-spacing:0;display:block;margin-top:2px;}
.total-badge{background:var(--a1);color:#fff;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin-left:auto;}
.search-bar{position:relative;}
.search-bar input{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--t1);border-radius:10px;padding:9px 16px 9px 38px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s;}
.search-bar input:focus{border-color:var(--a1);}
.search-bar svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t2);}
.search-bar input::placeholder{color:var(--t2);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);display:flex;z-index:100;padding:6px 0 10px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--t2);font-family:'Noto Sans KR',sans-serif;font-size:10px;cursor:pointer;padding:4px 2px;transition:color .15s;}
.nav-btn.active{color:var(--a1);}
.nav-btn svg{width:20px;height:20px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:var(--s1);border-bottom:1px solid var(--bd);}
.filter-bar::-webkit-scrollbar{height:0;}
.fb{background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:20px;padding:4px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.fb.active{background:var(--a1);border-color:var(--a1);color:#fff;font-weight:700;}

/* CONTENT */
.content{padding:14px 16px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.stat-val{font-size:20px;font-weight:900;line-height:1;}
.stat-lbl{font-size:11px;color:var(--t2);margin-top:2px;}

/* MEMBER CARDS */
.member-list{display:flex;flex-direction:column;gap:8px;}
.member-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .15s;}
.member-card:hover{border-color:var(--a1);}
.member-top{display:flex;align-items:center;gap:10px;}
.avatar{width:42px;height:42px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#1e3a8a,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;position:relative;overflow:hidden;}
.avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px;}
.member-main{flex:1;min-width:0;}
.member-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px;}
.member-org{font-size:12px;color:var(--t2);margin-top:1px;}
.num-badge{background:var(--s2);color:var(--t2);font-size:11px;border-radius:5px;padding:1px 5px;font-weight:400;}
.member-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.tag{font-size:11px;border-radius:5px;padding:2px 7px;font-weight:500;white-space:nowrap;}
.t-bun{background:#1e3a5f;color:#93c5fd;}
.t-res{background:#451a03;color:#fcd34d;}
.t-lan{background:#2e1065;color:#c4b5fd;}
.t-trv{background:#4a1942;color:#f9a8d4;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px;padding-bottom:36px;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 18px;}
.modal-avatar{width:68px;height:68px;border-radius:16px;margin:0 auto 10px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff;position:relative;overflow:hidden;}
.modal-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:16px;}
.modal-name{text-align:center;font-size:20px;font-weight:900;}
.modal-sub{text-align:center;color:var(--t2);font-size:13px;margin-top:3px;}
.modal-div{border:none;border-top:1px solid var(--bd);margin:14px 0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ii{background:var(--s2);border-radius:10px;padding:10px 12px;}
.ii.full{grid-column:1/-1;}
.ii-lbl{font-size:11px;color:var(--t2);margin-bottom:3px;}
.ii-val{font-size:13px;font-weight:600;}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.btn-call{background:var(--a1);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-sms{background:#14532d;color:#86efac;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-close{grid-column:1/-1;display:block;width:100%;background:var(--s2);color:var(--t2);border:1px solid var(--bd);border-radius:12px;padding:11px;font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;margin-top:4px;}

/* GROUP VIEW */
.group-section{margin-bottom:16px;}
.group-hdr{background:var(--s2);border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.group-title{font-size:14px;font-weight:700;}
.group-cnt{font-size:12px;color:var(--t2);}
.group-pills{display:flex;flex-wrap:wrap;gap:5px;}
.pill{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;transition:border-color .15s;}
.pill:hover{border-color:var(--a1);color:var(--t3);}
.pill span{color:var(--t2);font-size:11px;margin-left:3px;}

/* RESULTS INFO */
.results-info{font-size:12px;color:var(--t2);padding:6px 0 4px;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--t2);}

/* STAFF CARDS */
.staff-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.staff-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;}
.staff-avatar{width:56px;height:56px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;overflow:hidden;position:relative;}
.staff-info{flex:1;}
.staff-name{font-size:17px;font-weight:900;}
.staff-role{font-size:12px;margin-top:2px;font-weight:600;}
.staff-actions{display:flex;gap:8px;margin-top:10px;}
.staff-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:none;}

/* TIMETABLE */
.tt-week{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.tt-week::-webkit-scrollbar{height:0;}
.tt-day-btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:8px;padding:6px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.tt-day-btn.active{background:var(--a1);border-color:var(--a1);color:#fff;font-weight:700;}
.tt-card{background:var(--s1);border-radius:12px;border:1px solid var(--bd);overflow:hidden;margin-bottom:8px;}
.tt-time{background:var(--s2);padding:8px 14px;font-size:12px;color:var(--t2);font-weight:600;}
.tt-content{padding:12px 14px;}
.tt-subject{font-size:15px;font-weight:700;margin-bottom:4px;}
.tt-detail{font-size:12px;color:var(--t2);}
.tt-type{display:inline-block;font-size:11px;border-radius:5px;padding:2px 7px;font-weight:600;margin-top:6px;}

/* MENU */
.menu-week{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.menu-week::-webkit-scrollbar{height:0;}
.menu-day-btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:8px;padding:6px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.menu-day-btn.active{background:var(--a2);border-color:var(--a2);color:#fff;font-weight:700;}
.meal-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.meal-hdr{padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.meal-items{padding:0 14px 12px;}
.meal-item{padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px;display:flex;align-items:center;gap:8px;}
.meal-item:last-child{border-bottom:none;}
.meal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* SEAT MAP */
.seat-notice{background:var(--s2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--t2);}
.seat-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.sf-btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:8px;padding:5px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.sf-btn.active{background:var(--a3);border-color:var(--a3);color:#000;font-weight:700;}
.classroom{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px;}
.classroom-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--a3);}
.podium{background:var(--s2);border-radius:8px;padding:8px;text-align:center;font-size:12px;color:var(--t2);margin-bottom:12px;}
.seat-grid{display:grid;gap:5px;}
.seat-row{display:flex;gap:5px;justify-content:center;}
.seat{width:52px;height:44px;border-radius:8px;border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:10px;text-align:center;transition:border-color .15s;flex-shrink:0;}
.seat:hover{border-color:var(--a1);}
.seat .sname{font-size:11px;font-weight:700;line-height:1.2;}
.seat .snum{font-size:9px;color:var(--t2);}
.seat.empty{cursor:default;background:transparent;border-style:dashed;border-color:#2a3142;}

/* ORG VIEW */
.org-section{margin-bottom:16px;}

/* PASSWORD LOCK */
.pw-overlay{position:fixed;inset:0;background:#0d1117;z-index:9999;display:flex;align-items:center;justify-content:center;}
.pw-box{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:36px 28px;width:90%;max-width:340px;text-align:center;}
.pw-logo{font-size:32px;margin-bottom:8px;}
.pw-title{font-size:18px;font-weight:900;color:#e6edf3;margin-bottom:4px;}
.pw-sub{font-size:13px;color:#8b949e;margin-bottom:24px;}
.pw-input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:10px;padding:12px 16px;font-size:16px;font-family:'Noto Sans KR',sans-serif;outline:none;text-align:center;letter-spacing:4px;box-sizing:border-box;transition:border .2s;}
.pw-input:focus{border-color:#3b82f6;}
.pw-btn{width:100%;margin-top:12px;background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.pw-btn:active{opacity:.85;}
.pw-error{color:#ef4444;font-size:13px;margin-top:10px;height:18px;}
.pw-hint{color:#8b949e;font-size:11px;margin-top:16px;}
</style>
</head>
<body>
<!-- 비밀번호 잠금 화면 -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-logo">🔐</div>
    <div class="pw-title">제25기 핵심인재과정</div>
    <div class="pw-sub">접속하려면 비밀번호를 입력하세요</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="••••••"
      maxlength="20" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">입장하기</button>
    <div class="pw-error" id="pwError"></div>
    <div class="pw-hint">※ 비밀번호는 운영진에게 문의하세요</div>
  </div>
</div>
<script>
// 비밀번호 설정 (변경하려면 이 값을 수정하세요)
const APP_PASSWORD_HASH = '7fd0a17b914646b1d549eae9f766e104b952ca387f12a2ad72a764d280c9d69e';

// AES-GCM 복호화 함수
async function aesDecrypt(b64, keyBytes) {
  const raw = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const iv  = raw.slice(0,12);
  const tag = raw.slice(12,28);
  const ct  = raw.slice(28);
  const key = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['decrypt']);
  const combined = new Uint8Array(ct.length + tag.length);
  combined.set(ct); combined.set(tag, ct.length);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, combined);
  return new TextDecoder().decode(pt);
}

// SHA-256 해시
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 비밀번호로 AES 키 생성
async function makeKey(pw) {
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return new Uint8Array(hash);
}

async function checkPw(){
  const val = document.getElementById('pwInput').value;
  const inputHash = await sha256(val);
  if(inputHash === APP_PASSWORD_HASH){
    // 복호화 실행
    const keyBytes = await makeKey(val);
    const decrypted = await Promise.all(DATA.map(async m => {
      const row = {...m};
      for(const field of ['성명','전화번호','소속']){
        if(row[field]) row[field] = await aesDecrypt(row[field], keyBytes);
      }
      return row;
    }));
    // DATA 교체
    DATA.length = 0;
    decrypted.forEach(r => DATA.push(r));
    document.getElementById('pwOverlay').style.display='none';
    sessionStorage.setItem('pw_ok','1');
    sessionStorage.setItem('pw_val', val);
    render();
  } else {
    document.getElementById('pwError').textContent='비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>document.getElementById('pwError').textContent='',2000);
  }
}

// 이미 인증된 경우 바로 복호화 후 통과
if(sessionStorage.getItem('pw_ok')==='1'){
  const savedPw = sessionStorage.getItem('pw_val');
  if(savedPw){
    document.addEventListener('DOMContentLoaded', async ()=>{
      const ov=document.getElementById('pwOverlay');
      if(ov) ov.style.display='none';
      const keyBytes = await makeKey(savedPw);
      const decrypted = await Promise.all(DATA.map(async m => {
        const row = {...m};
        for(const field of ['성명','전화번호','소속']){
          if(row[field]) row[field] = await aesDecrypt(row[field], keyBytes);
        }
        return row;
      }));
      DATA.length = 0;
      decrypted.forEach(r => DATA.push(r));
      render();
    });
  }
}
</script>

  </button>
  <button class="nav-btn" data-tab="staff" onclick="setTab('staff')">

// ===== HELPERS =====
function ini(n){return n.charAt(0);}
//파일명수정
//function photo(m){return `photos/${String(m.교번).padStart(3,'0')}_${m.소속}_${m.성명}.jpg`;}
function photo(m){return `photos/${String(m.교번).padStart(3,'0')}.jpg`;}
function avi(m,cls){return `<div class="${cls}">${ini(m.성명)}<img src="${photo(m)}" alt="" onerror="this.remove()" loading="lazy"></div>`;}

function filteredData(){
  let d=DATA;
  if(searchQuery){const q=searchQuery.toLowerCase();d=d.filter(m=>m.성명.includes(q)||m.소속.includes(q)||m.교번===q||m.직렬.includes(q));}
  if(currentFilter!=='all'){
    if(currentTab==='bun')d=d.filter(m=>m.분임===currentFilter);
    else if(currentTab==='org')d=d.filter(m=>m.소속===currentFilter);
    else if(currentTab==='utopia')d=d.filter(m=>m.발표회차===currentFilter);
    else if(currentTab==='research')d=d.filter(m=>m.직무연구조===currentFilter);
    else if(currentTab==='lang'){
      if(currentFilter.startsWith('일본어(')){
        const ban=currentFilter.replace('일본어(','').replace(')','');
        d=d.filter(m=>m.외국어==='일본어'&&m.외국어반===ban);
      } else {
        d=d.filter(m=>m.외국어===currentFilter);
      }
    }
  }
  return d;
}

function setTab(tab){
  currentTab=tab;
  currentFilter='all';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  renderFilter();
  render();
}

function setFilter(val){currentFilter=val;renderFilter();render();}

function renderFilter(){
  const fb=document.getElementById('filterBar');
  let opts=[{v:'all',l:'전체'}];
  if(currentTab==='bun'){for(let i=1;i<=12;i++)opts.push({v:`${i}분임`,l:`${i}분임`});}
  else if(currentTab==='org'){const orgs=[...new Set(DATA.map(m=>m.소속))].sort();orgs.forEach(o=>opts.push({v:o,l:o}));}
  else if(currentTab==='utopia'){for(let i=1;i<=8;i++){const mo=['3월','4월','5월','6월','7월','8월','9월','10월'][i-1];opts.push({v:`${i}회차`,l:`${i}회차(${mo})`});}}
  else if(currentTab==='research'){for(let i=1;i<=28;i++)opts.push({v:`${i}조`,l:`${i}조`});}
  else if(currentTab==='lang'){
    ['영어','스페인어','중국어','일본어(4반)','일본어(5반)','일본어(6반)','일본어(7반)'].forEach(l=>opts.push({v:l,l:l}));
  }
  else if(currentTab==='travel'){['1팀','2팀','3팀','4팀'].forEach(t=>opts.push({v:t,l:t}));}
  else{fb.innerHTML='';return;}
  fb.innerHTML=opts.map(o=>`<button class="fb${currentFilter===o.v?' active':''}" onclick="setFilter('${o.v}')">${o.l}</button>`).join('');
}

function memberCard(m){
  const teamRegion = TEAM_REGIONS[m.국외연수팀];
  const utopiaMonth = UTOPIA_MONTH[m.발표회차];
  const utopiaTopic = UTOPIA_TOPICS[m.교번];
  const utopiaTitle = utopiaTopic ? utopiaTopic[0] : null;
  const utopiaSummary = utopiaTopic ? utopiaTopic[1] : null;
  return `<div class="member-card" onclick="openModal('${m.교번}')">
    <div class="member-top">
      ${avi(m,'avatar')}
      <div class="member-main">
        <div class="member-name">${m.성명} <span class="num-badge">#${m.교번}</span></div>
        <div class="member-org">${m.소속} · ${m.직렬}</div>
        ${utopiaTitle ? `<div style="font-size:11px;color:#f59e0b;margin-top:3px;line-height:1.3">🎤 "${utopiaTitle}"</div><div style="font-size:10px;color:#8b949e;margin-top:1px;line-height:1.3">${utopiaSummary}</div>` : ''}
      </div>
    </div>
    <div class="member-tags">
      <span class="tag t-bun">${m.분임}</span>
      <span class="tag t-res">직무${m.직무연구조}</span>
      <span class="tag t-lan">${m.외국어} ${m.외국어반}</span>
      <span class="tag t-trv">${teamRegion}</span>
      <span class="tag" style="background:#4a1942;color:#f9a8d4">🎤 ${utopiaMonth}</span>
    </div>
  </div>`;
}



function groupView(groups, keyFn, titleFn, subFn, clickFn){
  return groups.map(g=>{
    const members=DATA.filter(m=>keyFn(m)===g);
    if(!members.length)return '';
    return `<div class="group-section">
      <div class="group-hdr" onclick="${clickFn(g)}">
        <span class="group-title">${titleFn(g,members)}</span>
        <span class="group-cnt">${subFn(g,members)}</span>
      </div>
      <div class="group-pills">${members.map(m=>`<div class="pill" onclick="openModal('${m.교번}')">${m.성명}<span>${m.소속}</span></div>`).join('')}</div>
    </div>`;
  }).join('');
}

      <div style="background:var(--s2);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--t2)">
        🏫 <b style="color:var(--t1)">212호 강의실 자리배치</b> <span style="font-size:10px;color:var(--a3)">4.28 변경 반영</span>
        <span style="float:right;font-size:10px">이름 누르면 상세정보</span>
      </div>

      <div style="background:#1e3a5f30;border:1px solid #3b82f650;border-radius:8px;
                  padding:8px;text-align:center;font-size:12px;color:var(--t2);margin-bottom:10px">
        📺 강 단 · 스크린
      </div>

      <div style="overflow-x:auto;padding-bottom:6px">
        ${frontHTML}
      </div>

      <div style="background:var(--s2);border-radius:6px;padding:5px;
                  text-align:center;font-size:11px;color:var(--t2);margin:10px 0">
        ── 통 로 (전/중단 구분) ──
      </div>

      <div style="overflow-x:auto;padding-bottom:6px">
        ${SEAT_ROWS.BL.map((row,i)=>`
          <div style="display:flex;gap:12px;margin-bottom:3px;align-items:flex-start">
            <div style="display:flex;gap:3px">${SEAT_ROWS.BL[i].map(n=>seatCell(n)).join('')}</div>
            <div style="width:16px"></div>
            <div style="border:2px solid var(--bd);border-radius:8px;width:${5*(58+3)-3}px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:${i===0?'12px':'0px'};height:${i===0?'44px':'44px'}">${i===0?'출 입 문':''}</div>
            <div style="width:16px"></div>
            <div style="display:flex;gap:3px">${SEAT_ROWS.BR[i].map(n=>seatCell(n)).join('')}</div>
          </div>`).join('')}
      </div>

      <div style="background:var(--s2);border-radius:6px;padding:5px;
                  text-align:center;font-size:11px;color:var(--t2);margin:6px 0">
        ── 통 로 (전/중단 구분) ──
      </div>

      <div style="display:flex;gap:16px;justify-content:flex-start;overflow-x:auto;padding-bottom:6px">
        <div>
          <div style="font-size:10px;color:var(--t2);margin-bottom:5px;text-align:center">하단 좌측</div>
          ${SEAT_ROWS.BOTL.map(r=>makeRow(r)).join('')}
        </div>
        <div style="width:12px"></div>
        <div style="width:302px"></div>
        <div style="width:12px"></div>
        <div>
          <div style="font-size:10px;color:var(--t2);margin-bottom:5px;text-align:center">하단 우측</div>
          ${SEAT_ROWS.BOTR.map(r=>makeRow(r)).join('')}
        </div>
      </div>`;
    return;
  }

  // STAFF TAB  // STAFF TAB  // STAFF TAB  // STAFF TAB
  if(currentTab==='staff'){
    document.getElementById('totalBadge').textContent=`${STAFF.length}명`;
    c.innerHTML=`
      <div style="background:var(--s2);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--t2);">
        👋 제25기 핵심인재과정 운영진입니다. 과정 진행 중 궁금한 사항은 언제든지 연락주세요.
      </div>
      <div class="staff-grid">
        ${STAFF.map(s=>`<div class="staff-card">
          <div class="staff-avatar" style="background:${s.bg}">
            ${s.emoji}
            <img src="${s.photo}" alt="" onerror="this.remove()"
              style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:14px">
          </div>
          <div style="flex:1">
            <div class="staff-name">${s.name}</div>
            <div class="staff-role" style="color:${s.bg}">${s.role}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:4px">${s.phone}</div>
            <div class="staff-actions">
              <a href="tel:${s.phone}" class="staff-btn" style="background:${s.bg}20;color:${s.bg}">📞 전화</a>
              <a href="sms:${s.phone}" class="staff-btn" style="background:#14532d20;color:#86efac">💬 문자</a>
            </div>
          </div>
        </div>`).join('')}
      </div>`;
    return;
  }

  // DEFAULT - filtered list
  if(!d.length){c.innerHTML='<div class="empty">검색 결과 없음</div>';return;}
  c.innerHTML=`<div class="results-info">${d.length}명</div><div class="member-list">${d.map(memberCard).join('')}</div>`;
}

function getBunColor(bun){
  const colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#a855f7','#14b8a6','#fb923c'];
  const n=parseInt(bun)-1;
  return colors[n%colors.length];
}

function openModal(num){
  const m=DATA.find(d=>d.교번===num);
  if(!m)return;
  document.getElementById('modalContent').innerHTML=`
    ${avi(m,'modal-avatar')}
    <div class="modal-name">${m.성명}</div>
    <div class="modal-sub">${m.소속} · 교번 ${m.교번}</div>
    <hr class="modal-div">
    <div class="info-grid">
      <div class="ii"><div class="ii-lbl">분임</div><div class="ii-val">${m.분임}</div></div>
      <div class="ii"><div class="ii-lbl">직렬</div><div class="ii-val">${m.직렬}</div></div>
      <div class="ii"><div class="ii-lbl">유토피아 발표</div><div class="ii-val">${utopiaLabel(m)} (${m.발표회차})</div></div>
      <div class="ii"><div class="ii-lbl">외국어반</div><div class="ii-val">${m.외국어} ${m.외국어반}</div></div>
      <div class="ii full"><div class="ii-lbl">직무연구</div><div class="ii-val">${m.직무연구조} · ${m.직무연구주제}</div></div>
      <div class="ii"><div class="ii-lbl">지도교수</div><div class="ii-val">${m.지도교수}</div></div>
      <div class="ii"><div class="ii-lbl">국외연수</div><div class="ii-val">${m.국외연수팀} · ${m.국외연수지역}</div></div>
    </div>
    <div class="action-btns">
      <a href="tel:${m.전화번호}" class="btn-call">📞 전화하기</a>
      <a href="sms:${m.전화번호}" class="btn-sms">💬 문자보내기</a>
    </div>
    <button class="btn-close" onclick="closeModal()">닫기</button>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();
  if(searchQuery){currentTab='list';currentFilter='all';document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='list'));renderFilter();}
  render();
});

renderFilter();
render();
</script>
</body>
</html>
